<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#e2edff">
    <title>Visa Bulletin Checker</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto Condensed', Arial, sans-serif;
            background-color: #e2edff;
            color: #06284c;
            margin: 0;
            padding: 16px;
        }
        a {
            color: grey;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        a:focus-visible {
            outline: 2px solid #06284c;
            outline-offset: 2px;
            border-radius: 2px;
        }
        .result-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border: 2px solid #25324a;
            border-radius: 16px;
            overflow: hidden;
            font-family: 'robotocondensed-regular-webfont', Arial, sans-serif;
            font-size: 14px;
            color: #444444;
        }
        .result-table th, .result-table td {
            padding: 12px 16px;
            border: 1px solid #e6e6e6;
            text-align: left;
            font-variant-numeric: tabular-nums;
        }
        .result-table th {
            background-color: #f2f2f2;
            font-weight: 500;
        }
        .result-table tr:nth-child(odd) {
            background-color: #ced9ea;
        }
        .result-table tr:nth-child(even) {
            background-color: #e2edff;
        }
        .result-table tr:first-child th,
        .result-table tr:first-child td {
            background-color: #06284c;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
        }
        .hits-table {
            font-size: 0.7em;
            margin: 5px 0;
            font-variant-numeric: tabular-nums;
        }
        .hits-table td {
            padding-right: 20px;
        }
        input[type="email"] {
            padding: 6px 10px;
            border: 1px solid #aaa;
            border-radius: 4px;
            font-size: 14px;
        }
        input[type="email"]:focus-visible {
            outline: 2px solid #06284c;
            outline-offset: 1px;
        }
        button[type="submit"] {
            padding: 6px 16px;
            border: 1px solid #25324a;
            border-radius: 4px;
            background-color: #06284c;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
            margin-left: 10px;
            transition: background-color 0.15s, transform 0.1s;
        }
        button[type="submit"]:hover {
            background-color: #0e3d6b;
        }
        button[type="submit"]:active {
            transform: scale(0.98);
        }
        button[type="submit"]:focus-visible {
            outline: 2px solid #06284c;
            outline-offset: 2px;
        }
        input[type="checkbox"] {
            accent-color: #06284c;
        }
        label {
            margin-left: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main>
        <section>
            <p style="font-size: 0.7em;">📊 Page Hits:</p>
            <table class="hits-table">
                <tr>
                    <td>Total: {{ hits.total|int|comma }}</td>
                    <td>Monthly ({{ current_month }}): {{ hits.monthly|int|comma }}</td>
                    <td>Daily ({{ current_date }}): {{ hits.daily|int|comma }}</td>
                </tr>
            </table>
            <p style="font-size: 0.9em;">👥 Subscriber Count: {{ subscriber_count|int|comma }}</p>
        </section>
        <hr>
        <section>
            {{ result|safe }}
        </section>
        <hr>
        <section>
            <form method="post">
                <label for="email-input" class="visually-hidden" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Email address</label>
                <input type="email" id="email-input" name="email" placeholder="Enter email…" autocomplete="email" spellcheck="false" required>
                <label>
                    <input type="checkbox" name="unsubscribe" id="unsubscribe-checkbox" onchange="updateButtonText()"> Unsubscribe
                </label>
                <button type="submit" id="submit-button">🔔 <strong>Submit</strong></button>
            </form>
        </section>
        <div>
            {{ subs_msg|safe }}
        </div>
    </main>
    <footer style="margin-top: 32px;">
        <p><a href='https://github.com/karingz/VisaBulletinChecker' target='_blank'><i class='fab fa-github' aria-hidden="true"></i> Visit GitHub Page</a></p>
        <p>📧 <a href='mailto:imaginaryground@gmail.com'>Email Me</a></p>
    </footer>
    <script>
        function updateButtonText() {
            const checkbox = document.getElementById('unsubscribe-checkbox');
            const button = document.getElementById('submit-button');
            button.innerHTML = checkbox.checked ? '🔕 <strong>Submit</strong>' : '🔔 <strong>Submit</strong>';
        }
    </script>
</body>
</html>
